<div id="root"></div>
<script>
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function boot(){
  await loadScript('https://unpkg.com/react@18/umd/react.production.min.js');
  await loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js');
  window.React=React; window.ReactDOM=ReactDOM;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
  const src=document.getElementById('app').textContent;
  // Hash simples do código para invalidar cache em novos deploys
  const srcHash=src.length+'-'+src.slice(0,64).replace(/\s/g,'').slice(0,20);
  const cacheKey='italin_babel_'+srcHash;
  // Limpa caches de versões antigas
  Object.keys(sessionStorage).filter(k=>k.startsWith('italin_babel_')&&k!==cacheKey).forEach(k=>sessionStorage.removeItem(k));
  let out=sessionStorage.getItem(cacheKey);
  if(!out){
    await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
    out=Babel.transform(src,{presets:['react']}).code;
    try{sessionStorage.setItem(cacheKey,out);}catch(e){}
  }
  eval(out);
}
boot().catch(e=>{document.getElementById('root').innerHTML='<div style="padding:40px;color:red"><h2>Erro:</h2><pre>'+e+'</pre></div>';});
</script>

// Pure SVG chart
function LineChart({data,height=240}){
  if(!data||data.length<2) return null;
  const [tip,setTip]=useState(null);
  const W=800,H=height,PL=50,PR=20,PT=20,PB=40;
  const cW=W-PL-PR, cH=H-PT-PB;
  const maxV=Math.max(...data.flatMap(d=>[d.entradas,d.saidas]),1);
  const x=i=>PL+i*(cW/(data.length-1));
  const y=v=>PT+cH-(v/maxV)*cH;
  const pts=k=>data.map((d,i)=>x(i)+","+y(d[k]||0)).join(" ");
  const area=k=>{const p=data.map((d,i)=>x(i)+","+y(d[k]||0)).join(" L");return "M"+x(0)+","+y(0)+" L"+p+" L"+x(data.length-1)+","+(PT+cH)+" L"+x(0)+","+(PT+cH)+" Z";};
  return(
    <div style={{position:"relative"}}>
      {tip&&(
        <div style={{position:"absolute",left:tip.x+"%",top:0,transform:"translateX(-50%)",background:C.text,color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:12,pointerEvents:"none",zIndex:10,whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,.2)"}}>
          <div style={{fontWeight:700,marginBottom:4}}>{tip.date}</div>
          <div style={{color:"#A8D5A2"}}>↑ Entradas: <strong>{tip.entradas}</strong></div>
          <div style={{color:"#F4A99A"}}>↓ Saídas: <strong>{tip.saidas}</strong></div>
        </div>
      )}
      <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:height,display:"block"}}
        onMouseLeave={()=>setTip(null)}>
        <defs>
          <linearGradient id="gi" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#2D5A27" stopOpacity="0.25"/><stop offset="95%" stopColor="#2D5A27" stopOpacity="0"/></linearGradient>
          <linearGradient id="go" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#C2452D" stopOpacity="0.25"/><stop offset="95%" stopColor="#C2452D" stopOpacity="0"/></linearGradient>
        </defs>
        {[0,1,2,3,4].map(i=>{const yy=PT+i*(cH/4);return <line key={i} x1={PL} y1={yy} x2={PL+cW} y2={yy} stroke="#E8DDD4" strokeDasharray="4 2"/>;}).map(e=>e)}
        {[0,1,2,3,4].map(i=>{const v=Math.round(maxV*(1-i/4));const yy=PT+i*(cH/4);return <text key={i} x={PL-6} y={yy+4} textAnchor="end" fontSize="11" fill="#9A8A7E">{v}</text>;}).map(e=>e)}
        {data.filter((_,i)=>i%Math.ceil(data.length/7)===0||i===data.length-1).map(d=>{const i=data.indexOf(d);return <text key={i} x={x(i)} y={H-8} textAnchor="middle" fontSize="11" fill="#9A8A7E">{d.date}</text>;})}
        <path d={area("entradas")} fill="url(#gi)"/>
        <path d={area("saidas")} fill="url(#go)"/>
        <polyline points={pts("entradas")} fill="none" stroke="#2D5A27" strokeWidth="2.5" strokeLinejoin="round"/>
        <polyline points={pts("saidas")} fill="none" stroke="#C2452D" strokeWidth="2.5" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <g key={i} onMouseEnter={()=>setTip({...d,x:(x(i)-PL)/cW*100})}>
            <line x1={x(i)} y1={PT} x2={x(i)} y2={PT+cH} stroke="transparent" strokeWidth="24"/>
            <circle cx={x(i)} cy={y(d.entradas||0)} r={tip&&tip.date===d.date?5:3} fill="#2D5A27" opacity={tip&&tip.date===d.date?1:0.5}/>
            <circle cx={x(i)} cy={y(d.saidas||0)} r={tip&&tip.date===d.date?5:3} fill="#C2452D" opacity={tip&&tip.date===d.date?1:0.5}/>
          </g>
        ))}
        <rect x={PL} y={H-12} width="12" height="3" fill="#2D5A27" rx="1.5"/>
        <text x={PL+16} y={H-6} fontSize="11" fill="#6B5B4F">Entradas</text>
        <rect x={PL+100} y={H-12} width="12" height="3" fill="#C2452D" rx="1.5"/>
        <text x={PL+116} y={H-6} fontSize="11" fill="#6B5B4F">Saídas</text>
      </svg>
    </div>
  );
}

// DB
const DB_KEYS={items:'italin:items',employees:'italin:employees',movements:'italin:movements',portioning:'italin:portioning',categories:'italin:categories',units:'italin:units',waste:'italin:waste'};
const db={
  async save(k,d){
    try{
      // Atualiza cache local imediatamente
      try{sessionStorage.setItem('cache:'+k, JSON.stringify(d));}catch(e){}
      const r=await fetch('/api/db',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,value:d})});
      return r.ok;
    }catch(e){console.error('db.save error',e);return false;}
  },
  async load(k,def){
    try{
      // Tenta cache local primeiro para resposta instantânea
      const cached=sessionStorage.getItem('cache:'+k);
      if(cached){
        // Atualiza em background sem bloquear
        fetch('/api/db?key='+encodeURIComponent(k)).then(async r=>{
          if(r.ok){const fresh=await r.json();if(fresh!==null)try{sessionStorage.setItem('cache:'+k,JSON.stringify(fresh));}catch(e){}}
        }).catch(()=>{});
        return JSON.parse(cached);
      }
      const r=await fetch('/api/db?key='+encodeURIComponent(k));
      if(!r.ok) return def||null;
      const data=await r.json();
      if(data!==null&&data!==undefined)try{sessionStorage.setItem('cache:'+k,JSON.stringify(data));}catch(e){}
      return data!==null&&data!==undefined?data:(def||null);
    }catch(e){console.error('db.load error',e);return def||null;}
  },
  async clearAll(){
    try{
      Object.values(DB_KEYS).forEach(k=>sessionStorage.removeItem('cache:'+k));
      await fetch('/api/db',{method:'DELETE'});return true;
    }catch(e){return false;}
  }
};

// Base components
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  const cfgs={success:{bg:C.successLight,bd:C.success,IC:Ic.OK},error:{bg:C.dangerLight,bd:C.danger,IC:Ic.Err},warning:{bg:C.warningLight,bd:C.warning,IC:Ic.Warn}};
  const cfg=cfgs[type]||cfgs.success;
  return (
    <div style={{position:"fixed",top:24,right:24,zIndex:9999,background:cfg.bg,borderLeft:"4px solid "+cfg.bd,borderRadius:10,padding:"14px 20px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 8px 32px rgba(0,0,0,.12)",minWidth:300,maxWidth:440}}>
      <cfg.IC size={18} color={cfg.bd}/>
      <span style={{color:C.text,fontSize:14,fontWeight:500,flex:1,fontFamily:font}}>{message}</span>
      <div onClick={onClose} style={{cursor:"pointer",display:"flex",alignItems:"center",flexShrink:0}}><Ic.Close size={16} color={C.textMuted}/></div>
    </div>
  );
}

function Modal({open,onClose,title,children,width=560}){
  useEffect(()=>{
    if(!open) return;
    const fn=e=>{if(e.key==="Escape") onClose();};
    window.addEventListener("keydown",fn);
    return()=>window.removeEventListener("keydown",fn);
  },[open]);
  if(!open) return null;
  return (

function DT({columns,data,onEdit,onDelete,actions,onBulkDelete,pageSize=PG}){
  const [page,setPage]=useState(1);
  const [sk,setSk]=useState(null);
  const [sd,setSd]=useState("asc");
  const [sel,setSel]=useState(new Set());
  const [bulkDm,setBulkDm]=useState(false);
  const hasA=onEdit||onDelete||actions;
  const hasBulk=!!onBulkDelete;

  useEffect(()=>{setPage(1);setSel(new Set());},[data.length]);

  const sorted=useMemo(()=>{
    if(!sk) return data;
    return [...data].sort((a,b)=>{
      const av=a[sk],bv=b[sk];
      if(av===bv) return 0;
      if(av==null) return 1;
      if(bv==null) return -1;
      const c=typeof av==="string"?av.localeCompare(bv):av-bv;
      return sd==="asc"?c:-c;
    });
  },[data,sk,sd]);

  const tot=Math.ceil(sorted.length/pageSize);
  const paged=sorted.slice((page-1)*pageSize,page*pageSize);
  const doSort=k=>{if(sk===k){setSd(d=>d==="asc"?"desc":"asc");}else{setSk(k);setSd("asc");}};

  const allPageIds=paged.map(r=>r.id??r);
  const allPageSel=allPageIds.length>0&&allPageIds.every(id=>sel.has(id));
  const somePageSel=allPageIds.some(id=>sel.has(id));

  function toggleRow(id){
    setSel(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  }
  function togglePage(){
    setSel(prev=>{
      const n=new Set(prev);
      if(allPageSel){allPageIds.forEach(id=>n.delete(id));}
      else{allPageIds.forEach(id=>n.add(id));}
      return n;
    });
  }
  function selectAll(){setSel(new Set(sorted.map(r=>r.id??r)));}
  function clearSel(){setSel(new Set());}

  function doBulkDelete(){
    onBulkDelete([...sel]);
    setSel(new Set());
    setBulkDm(false);
  }

  const colCount=columns.length+(hasBulk?1:0)+(hasA?1:0);

  return (
    <div>
      {/* Barra de seleção múltipla */}
      {hasBulk&&sel.size>0&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"linear-gradient(90deg,"+C.primaryLight+","+C.warningLight+")",borderBottom:"1px solid "+C.border,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,fontWeight:700,color:C.primary}}>{sel.size} selecionado{sel.size>1?"s":""}</span>
            {sel.size<sorted.length&&(
              <button onClick={selectAll} style={{fontSize:12,color:C.primary,background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:font}}>
                Selecionar todos ({sorted.length})
              </button>
            )}
            <button onClick={clearSel} style={{fontSize:12,color:C.textMuted,background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:font}}>
              Limpar seleção
            </button>
          </div>
          <Btn variant="danger" size="sm" onClick={()=>setBulkDm(true)} icon={<Ic.Trash size={14}/>}>
            Excluir {sel.size} item{sel.size>1?"s":""}
          </Btn>
        </div>
      )}

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontFamily:font}}>
          <thead>
            <tr>
              {hasBulk&&(
                <th style={{padding:"12px 14px",width:40,borderBottom:"2px solid "+C.border}}>
                  <input type="checkbox" checked={allPageSel} ref={el=>{if(el)el.indeterminate=somePageSel&&!allPageSel;}}
                    onChange={togglePage}
                    style={{width:16,height:16,cursor:"pointer",accentColor:C.primary}}/>
                </th>
              )}
              {columns.map(c=>(
                <th key={c.key} onClick={()=>!c.noSort&&doSort(c.key)}
                  style={{padding:"12px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:.8,borderBottom:"2px solid "+C.border,whiteSpace:"nowrap",cursor:c.noSort?"default":"pointer",userSelect:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    {c.label}
                    {!c.noSort&&(sk===c.key?(sd==="asc"?<Ic.AUp size={12} color={C.primary}/>:<Ic.ADn size={12} color={C.primary}/>):<Ic.Sort size={12} color={C.textMuted}/>)}
                  </div>
                </th>
              ))}
              {hasA&&<th style={{padding:"12px 14px",textAlign:"right",fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",borderBottom:"2px solid "+C.border}}>Ações</th>}
            </tr>
          </thead>
          <tbody>
            {paged.length===0
              ?<tr><td colSpan={colCount} style={{padding:48,textAlign:"center",color:C.textMuted,fontSize:14}}>Nenhum registro</td></tr>
              :paged.map((row,i)=>{
                const rid=row.id??i;
                const isSel=sel.has(rid);
                return (
                  <tr key={rid} style={{borderBottom:"1px solid "+C.border,background:isSel?"rgba(194,69,45,0.04)":"transparent"}}
                    onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background=C.bg;}}
                    onMouseLeave={e=>{e.currentTarget.style.background=isSel?"rgba(194,69,45,0.04)":"transparent";}}>
                    {hasBulk&&(
                      <td style={{padding:"12px 14px",width:40}}>
                        <input type="checkbox" checked={isSel} onChange={()=>toggleRow(rid)}
                          style={{width:16,height:16,cursor:"pointer",accentColor:C.primary}}/>
                      </td>
                    )}
                    {columns.map(c=>(
                      <td key={c.key} style={{padding:"12px 14px",fontSize:13.5,color:C.text,whiteSpace:c.nowrap?"nowrap":"normal"}}>
                        {c.render?c.render(row[c.key],row):(row[c.key]??"—")}
                      </td>
                    ))}
                    {hasA&&(
                      <td style={{padding:"12px 14px",textAlign:"right",whiteSpace:"nowrap"}}>
                        <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                          {actions&&actions(row)}
                          {onEdit&&<Btn variant="ghost" size="sm" onClick={()=>onEdit(row)} icon={<Ic.Edit size={14}/>}/>}
                          {onDelete&&<Btn variant="ghost" size="sm" onClick={()=>onDelete(row)} icon={<Ic.Trash size={14} color={C.danger}/>}/>}
                        </div>
                      </td>
                    )}
                  </tr>
                );
              })
            }
          </tbody>
        </table>
      </div>

      {/* Paginação */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderTop:"1px solid "+C.border,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:13,color:C.textMuted}}>
          {sorted.length>0?`Mostrando ${(page-1)*pageSize+1}–${Math.min(page*pageSize,sorted.length)} de ${sorted.length}`:""}
        </div>
        {tot>1&&(
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <Btn variant="ghost" size="sm" onClick={()=>setPage(1)} disabled={page===1} icon={<Ic.CLL size={16}/>}/>
            <Btn variant="ghost" size="sm" onClick={()=>setPage(p=>p-1)} disabled={page===1} icon={<Ic.ChL size={16}/>}/>
            <span style={{padding:"6px 12px",fontSize:13,fontWeight:600,color:C.text}}>{page}/{tot}</span>
            <Btn variant="ghost" size="sm" onClick={()=>setPage(p=>p+1)} disabled={page===tot} icon={<Ic.ChR size={16}/>}/>
            <Btn variant="ghost" size="sm" onClick={()=>setPage(tot)} disabled={page===tot} icon={<Ic.CRR size={16}/>}/>
          </div>
        )}
      </div>

      {/* Modal confirmação bulk delete */}
      <Modal open={bulkDm} onClose={()=>setBulkDm(false)} title="Excluir Selecionados" width={420}>
        <div style={{background:C.dangerLight,borderRadius:10,padding:16,border:"1px solid "+C.danger,marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
          <Ic.Warn size={24} color={C.danger}/>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.danger}}>{sel.size} registro{sel.size>1?"s":""} serão excluídos</div>
            <div style={{fontSize:12,color:C.textSec,marginTop:4}}>Esta ação não pode ser desfeita.</div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
          <Btn variant="ghost" onClick={()=>setBulkDm(false)}>Cancelar</Btn>
          <Btn variant="danger" onClick={doBulkDelete} icon={<Ic.Trash size={16}/>}>Excluir {sel.size} item{sel.size>1?"s":""}</Btn>
        </div>
      </Modal>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("dashboard");
  const [items,setItems]=useState([]);
  const [emps,setEmps]=useState([]);
  const [movs,setMovs]=useState([]);
  const [port,setPort]=useState([]);
  const [wastes,setWastes]=useState([]);
  const [cats,setCats]=useState([]);
  const [units,setUnits]=useState([]);
  const [toast,setToast]=useState(null);
  const [sb,setSb]=useState(window.innerWidth>768);
  const [init,setInit]=useState(false);
  const [dbSt,setDbSt]=useState("loading");
  const [lsav,setLsav]=useState(null);
  const [resetMod,setResetMod]=useState(false);
  const ref=useRef({});
  const tmr=useRef(null);
  const showToast=useCallback((m,t="success")=>setToast({message:m,type:t,key:Date.now()}),[]);

  useEffect(()=>{
    (async()=>{
      try{
        const[si,se,sm,sp,sc,su,sw]=await Promise.all([db.load(DB_KEYS.items),db.load(DB_KEYS.employees),db.load(DB_KEYS.movements),db.load(DB_KEYS.portioning),db.load(DB_KEYS.categories),db.load(DB_KEYS.units),db.load(DB_KEYS.waste)]);
        const li=si&&si.length>0?si:[];
        const le=se&&se.length>0?se:[];
        const lm=sm&&sm.length>0?sm:[];
        const lp=sp&&sp.length>0?sp:[];
        const lc=sc&&sc.length>0?sc:iCat;
        const lu=su&&su.length>0?su:iUni;
        const lw=sw&&sw.length>0?sw:[];
        setItems(li);setEmps(le);setMovs(lm);setPort(lp);setWastes(lw);setCats(lc);setUnits(lu);
        ref.current={items:li,emps:le,movs:lm,port:lp,wastes:lw,cats:lc,units:lu};
        setDbSt("saved");setInit(true);
      }catch(e){
        setCats(iCat);setUnits(iUni);
        setDbSt("error");setInit(true);
      }
    })();
  },[]);

  useEffect(()=>{
    if(!init) return;
    if(tmr.current) clearTimeout(tmr.current);
    // Captura snapshot dos valores atuais no momento do render
    const snap={items,emps,movs,port,wastes,cats,units};
    tmr.current=setTimeout(async()=>{
      const saves=[];
      const chk=(key,val,rk)=>{if(JSON.stringify(val)!==JSON.stringify(ref.current[rk])){saves.push({key,val,rk});}};
      chk(DB_KEYS.items,snap.items,"items");chk(DB_KEYS.employees,snap.emps,"emps");chk(DB_KEYS.movements,snap.movs,"movs");
      chk(DB_KEYS.portioning,snap.port,"port");chk(DB_KEYS.waste,snap.wastes,"wastes");chk(DB_KEYS.categories,snap.cats,"cats");chk(DB_KEYS.units,snap.units,"units");
      if(saves.length>0){
        setDbSt("saving");
        try{
          await Promise.all(saves.map(s=>db.save(s.key,s.val)));
          // Só atualiza ref APÓS save completar com sucesso
          saves.forEach(s=>{ref.current[s.rk]=s.val;});
          setDbSt("saved");setLsav(new Date().toISOString());
        }
        catch{setDbSt("error");}
      }
    },800);
    return()=>{if(tmr.current) clearTimeout(tmr.current);};
  },[items,emps,movs,port,wastes,cats,units,init]);

  const doReset=useCallback(async()=>{
    await db.clearAll();
    setItems([]);setEmps([]);setMovs([]);setPort([]);setWastes([]);setCats(iCat);setUnits(iUni);
    ref.current={};setDbSt("saved");setLsav(new Date().toISOString());
    setResetMod(false);
    showToast("Banco resetado!","warning");
  },[]);
  const resetDb=useCallback(()=>setResetMod(true),[]);

  const totVal=useMemo(()=>items.reduce((s,i)=>s+i.currentStock*i.cost,0),[items]);
  const thisM=useMemo(()=>{const n=new Date();return movs.filter(m=>{const d=new Date(m.date);return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();});},[movs]);

  const tabs=[
    {id:"dashboard",label:"Dashboard",IC:Ic.Home},

    {id:"stockin",label:"Entrada",IC:Ic.Up},
    {id:"stockout",label:"Saída",IC:Ic.Down},
    {id:"waste",label:"Desperdício",IC:Ic.Warn,badge:wastes.length},
    {id:"portioning",label:"Porcionamento",IC:Ic.Cut},
    {id:"employees",label:"Funcionários",IC:Ic.Users},

  const rp={items,setItems,employees:emps,setEmployees:setEmps,movements:movs,setMovements:setMovs,portioning:port,setPortioning:setPort,wastes,setWastes,categories:cats,setCategories:setCats,units,setUnits,showToast,criticalItems:crit,totalValue:totVal,monthIn:thisM.filter(m=>m.type==="in").length,monthOut:thisM.filter(m=>m.type==="out").length,onResetDb:resetDb,doReset};

      case "reports": return <RepTab {...rp}/>;

    }
  }

  if(!init){
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:font,background:C.bg,gap:20}}>
        <style>{"@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}"}</style>
        <div style={{width:80,height:80,borderRadius:20,background:"linear-gradient(135deg,"+C.primary+","+C.accent+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:800,fontFamily:fontD,color:"#fff"}}>IH</div>
        <div style={{display:"flex",alignItems:"center",gap:10,color:C.text}}>

      <style>{"*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:"+C.border+";border-radius:3px}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}"}</style>
      {toast&&<Toast key={toast.key} message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
      <Modal open={resetMod} onClose={()=>setResetMod(false)} title="Resetar Banco de Dados" width={440}>

// ===== DASHBOARD =====
function Dash({items,movements,criticalItems,totalValue,monthIn,monthOut,portioning}){
  const byDay=useMemo(()=>{
    const map={};const now=new Date();
    for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split("T")[0];map[k]={date:d.getDate()+"/"+(d.getMonth()+1),entradas:0,saidas:0};}
    movements.forEach(m=>{if(map[m.date]){if(m.type==="in")map[m.date].entradas+=m.quantity;else map[m.date].saidas+=m.quantity;}});
    return Object.values(map);
  },[movements]);
  const wp=useMemo(()=>{const w=new Date();w.setDate(w.getDate()-7);return portioning.filter(p=>new Date(p.date)>=w).reduce((s,p)=>s+p.quantity,0);},[portioning]);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {criticalItems.length>0&&(
        <div style={{background:"linear-gradient(135deg,"+C.dangerLight+","+C.warningLight+")",borderRadius:14,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,border:"1px solid "+C.border}}>
          <Ic.Warn size={22} color={C.danger}/>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.danger}}>{criticalItems.length} item(ns) em nível crítico!</div>
            <div style={{fontSize:12,color:C.textSec,marginTop:2}}>{criticalItems.slice(0,3).map(i=>i.name).join(", ")}{criticalItems.length>3?"...":""}</div>
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16}}>
        <KPI icon={<Ic.Box size={20} color={C.primary}/>} label="Total de Itens" value={fmtN(items.length)} sub={fmtN(items.reduce((s,i)=>s+i.currentStock,0))+" unidades"} bgColor={C.primaryLight}/>
        <KPI icon={<Ic.Warn size={20} color={C.warning}/>} label="Itens Críticos" value={criticalItems.length} sub={criticalItems.length>0?"Precisa repor!":"Tudo OK"} bgColor={C.warningLight}/>
        <KPI icon={<Ic.Store size={20} color={C.secondary}/>} label="Valor em Estoque" value={fmt(totalValue)} bgColor={C.secondaryLight}/>
        <KPI icon={<Ic.Cut size={20} color={C.accent}/>} label="Porcionamento" value={fmtN(wp)} sub="Últimos 7 dias" bgColor={C.accentLight}/>
      </div>
      <Card style={{padding:20}}>
        <h3 style={{fontSize:15,fontWeight:700,fontFamily:fontD,marginBottom:16}}>Movimentação (14 dias)</h3>
        <LineChart data={byDay}/>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",gap:16}}>
        <Card style={{padding:20}}>
          <h3 style={{fontSize:15,fontWeight:700,fontFamily:fontD,marginBottom:16}}>Resumo do Mês</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{padding:14,background:C.successLight,borderRadius:10,textAlign:"center"}}><Ic.Up size={24} color={C.success}/><div style={{fontSize:22,fontWeight:800,color:C.success,fontFamily:fontD,marginTop:6}}>{monthIn}</div><div style={{fontSize:11,color:C.textSec,fontWeight:600,textTransform:"uppercase"}}>Entradas</div></div>
            <div style={{padding:14,background:C.dangerLight,borderRadius:10,textAlign:"center"}}><Ic.Down size={24} color={C.danger}/><div style={{fontSize:22,fontWeight:800,color:C.danger,fontFamily:fontD,marginTop:6}}>{monthOut}</div><div style={{fontSize:11,color:C.textSec,fontWeight:600,textTransform:"uppercase"}}>Saídas</div></div>
          </div>
        </Card>
        {criticalItems.length>0&&(
          <Card style={{padding:20}}>
            <h3 style={{fontSize:15,fontWeight:700,fontFamily:fontD,marginBottom:16,color:C.danger}}>Itens Críticos</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {criticalItems.slice(0,5).map(it=>(
                <div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.dangerLight,borderRadius:8}}>
                  <span style={{fontSize:13,fontWeight:600}}>{it.name}</span>
                  <Badge color={C.danger} bg="rgba(194,69,45,.2)">{it.currentStock}/{it.minStock}</Badge>
                </div>
              ))}
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

// ===== ITENS =====
function ItemsTab({items,setItems,categories,units,showToast}){
  const [q,setQ]=useState("");
  const [fc,setFc]=useState("");
  const [mod,setMod]=useState(false);
  const [dm,setDm]=useState(false);
  const [td,setTd]=useState(null);
  const [ed,setEd]=useState(null);
  const ef={name:"",unit:"",category:"",minStock:"",cost:"",supplier:""};
  const [f,setF]=useState(ef);
  const [sav,setSav]=useState(false);
  const filt=useMemo(()=>items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())&&(!fc||i.category===fc)),[items,q,fc]);

  async function save(){
    if(!f.name||!f.unit||!f.category||!f.minStock||!f.cost){showToast("Preencha todos os campos","error");return;}
    const ms=Number(f.minStock),c=Number(f.cost);
    if(isNaN(ms)||isNaN(c)){showToast("Valores inválidos","error");return;}
    if(ms<0){showToast("Estoque mínimo não pode ser negativo","error");return;}
    if(c<0){showToast("Custo não pode ser negativo","error");return;}
    setSav(true);await new Promise(r=>setTimeout(r,300));
    if(ed){setItems(p=>p.map(i=>i.id===ed.id?{...i,...f,minStock:ms,cost:c}:i));showToast("Atualizado!");}
    else{setItems(p=>[...p,{id:nid(items),...f,minStock:ms,cost:c,currentStock:0}]);showToast("Cadastrado!");}
    setSav(false);setMod(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <SBar value={q} onChange={setQ} placeholder="Buscar item..."/>
        <Sel noMargin options={categories} value={fc} onChange={e=>setFc(e.target.value)} style={{width:160,padding:"10px 14px"}}/>
        <Btn onClick={()=>{setEd(null);setF(ef);setMod(true);}} icon={<Ic.Plus size={16}/>}>Novo Item</Btn>
      </div>
      <Card>
        <DT columns={[
          {key:"name",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},
          {key:"category",label:"Categoria",render:v=><Badge color={C.secondary} bg={C.secondaryLight}>{v}</Badge>},
          {key:"unit",label:"Unidade"},
          {key:"currentStock",label:"Estoque",render:(v,r)=><span style={{fontWeight:700,color:v<=r.minStock?C.danger:C.success}}>{v}</span>},
          {key:"minStock",label:"Mínimo"},
          {key:"cost",label:"Custo",render:v=>fmt(v),nowrap:true},
        ]} data={filt}
          onEdit={r=>{setEd(r);setF({name:r.name,unit:r.unit,category:r.category,minStock:String(r.minStock),cost:String(r.cost),supplier:r.supplier||""});setMod(true);}}
          onDelete={r=>{setTd(r);setDm(true);}}
          onBulkDelete={async ids=>{
            const novos=items.filter(i=>!ids.includes(i.id));
            setItems(novos);
            await db.save(DB_KEYS.items,novos);
            showToast(ids.length+" item(ns) excluído(s)","warning");
          }}/>
      </Card>
      <Modal open={mod} onClose={()=>!sav&&setMod(false)} title={ed?"Editar Item":"Novo Item"}>
        <Inp label="Nome" required value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Sel label="Unidade" required options={units} value={f.unit} onChange={e=>setF({...f,unit:e.target.value})}/>
          <Sel label="Categoria" required options={categories} value={f.category} onChange={e=>setF({...f,category:e.target.value})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Estoque Mínimo" required type="number" value={f.minStock} onChange={e=>setF({...f,minStock:e.target.value})}/>
          <Inp label="Custo (R$)" required type="number" step="0.01" value={f.cost} onChange={e=>setF({...f,cost:e.target.value})}/>
        </div>
        <Inp label="Fornecedor" value={f.supplier} onChange={e=>setF({...f,supplier:e.target.value})}/>
        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:20}}>
          <Btn variant="ghost" onClick={()=>setMod(false)} disabled={sav}>Cancelar</Btn>
          <Btn onClick={save} icon={<Ic.Check size={16}/>} loading={sav}>{sav?"Salvando...":"Salvar"}</Btn>
        </div>
      </Modal>
      <Modal open={dm} onClose={()=>setDm(false)} title="Confirmar Exclusão" width={420}>
        <p style={{fontSize:14,color:C.textSec,marginBottom:12}}>Tem certeza que deseja excluir?</p>
        {td&&<div style={{background:C.dangerLight,padding:14,borderRadius:8,border:"1px solid "+C.danger,marginBottom:20}}><div style={{fontSize:15,fontWeight:700}}>{td.name}</div><div style={{fontSize:12,color:C.textSec,marginTop:4}}>Estoque: {td.currentStock} {td.unit}</div></div>}
        <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
          <Btn variant="ghost" onClick={()=>setDm(false)}>Cancelar</Btn>
          <Btn variant="danger" onClick={async()=>{
            const novos=items.filter(i=>i.id!==td.id);
            setItems(novos);
            await db.save(DB_KEYS.items,novos);
            showToast(td.name+" excluído","warning");
            setDm(false);
          }} icon={<Ic.Trash size={16}/>}>Excluir</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ===== ENTRADA =====
function InTab({items,setItems,employees,movements,setMovements,showToast}){
  const [q,setQ]=useState("");
  const [iq,setIq]=useState("");
  const [mod,setMod]=useState(false);
  const [dm,setDm]=useState(false);
  const [td,setTd]=useState(null);
  const [ed,setEd]=useState(null);
  const [sav,setSav]=useState(false);
  const ef={itemId:"",quantity:"",batch:"",expiry:"",employee:"",date:today(),time:nowT(),supplier:"",price:""};
  const [f,setF]=useState(ef);
  const filt=useMemo(()=>movements.filter(m=>m.type==="in").sort((a,b)=>b.id-a.id).filter(m=>m.itemName.toLowerCase().includes(q.toLowerCase())),[movements,q]);
  const sel=items.find(i=>i.id===Number(f.itemId));
  const fi=useMemo(()=>items.filter(i=>i.name.toLowerCase().includes(iq.toLowerCase())),[items,iq]);

  function openEdit(row){
    setEd(row);
    setF({itemId:String(row.itemId),quantity:String(row.quantity),batch:row.batch||"",expiry:row.expiry||"",employee:row.employee,date:row.date,time:row.time,supplier:row.supplier||"",price:String(row.price||"")});
    setIq("");setMod(true);
  }

  async function save(){
    if(!f.itemId||!f.quantity||!f.employee||!f.price){showToast("Preencha todos os campos","error");return;}
    const qty=Number(f.quantity),pr=Number(f.price);
    if(isNaN(qty)||qty<=0||isNaN(pr)||pr<0){showToast("Valores inválidos","error");return;}
    if(f.date>today()){showToast("Data não pode ser futura","error");return;}
    setSav(true);await new Promise(r=>setTimeout(r,300));
    if(ed){
      // Se o item mudou, reverte estoque do item antigo e adiciona no novo
      const itemMudou=ed.itemId!==Number(f.itemId);
      setMovements(prev=>prev.map(m=>m.id===ed.id?{...m,...f,itemId:Number(f.itemId),itemName:sel.name,quantity:qty,price:pr,batch:f.batch,expiry:f.expiry||null}:m));
      if(itemMudou){
        setItems(prev=>prev.map(i=>{
          if(i.id===ed.itemId) return {...i,currentStock:Math.max(0,i.currentStock-ed.quantity)};
          if(i.id===Number(f.itemId)) return {...i,currentStock:i.currentStock+qty};
          return i;
        }));
      } else {
        const diff=qty-ed.quantity;
        setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:i.currentStock+diff}:i));
      }
      showToast("Entrada atualizada!");
    } else {
      setMovements(prev=>[...prev,{id:nid(prev),type:"in",itemId:Number(f.itemId),itemName:sel.name,quantity:qty,date:f.date,time:f.time,employee:f.employee,supplier:f.supplier||sel.supplier,price:pr,batch:f.batch,expiry:f.expiry||null,notes:"",invoice:null,reason:null,wasteReason:null}]);
      setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:i.currentStock+qty}:i));
      showToast("Entrada de "+qty+" "+sel.unit+" registrada!");
    }
    setSav(false);setMod(false);setEd(null);setIq("");setF({...ef,date:today(),time:nowT()});
  }

  function doDelete(){
    // Reverte a quantidade no estoque ao excluir
    setItems(prev=>prev.map(i=>i.id===td.itemId?{...i,currentStock:Math.max(0,i.currentStock-td.quantity)}:i));
    setMovements(prev=>prev.filter(m=>m.id!==td.id));
    showToast("Entrada excluída","warning");
    setDm(false);setTd(null);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <SBar value={q} onChange={setQ} placeholder="Buscar entrada..."/>
        <Btn onClick={()=>{setEd(null);setF({...ef,date:today(),time:nowT()});setIq("");setMod(true);}} variant="success" icon={<Ic.Up size={16}/>}>Nova Entrada</Btn>
      </div>
      <Card>
        <DT columns={[
          {key:"date",label:"Data",render:(v,r)=>fmtDate(v)+" "+r.time,nowrap:true},
          {key:"itemName",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},
          {key:"quantity",label:"Qtd",render:v=><Badge color={C.success} bg={C.successLight}>+{v}</Badge>},
          {key:"batch",label:"Lote",render:v=>v||"—"},
          {key:"supplier",label:"Fornecedor",render:v=>v||"—"},
          {key:"price",label:"Preço",render:v=>v?fmt(v):"—",nowrap:true},
          {key:"employee",label:"Responsável"},
        ]} data={filt} onEdit={openEdit} onDelete={r=>{setTd(r);setDm(true);}}
          onBulkDelete={ids=>{
            const removidos=movements.filter(m=>ids.includes(m.id));
            // Reverte estoque de cada entrada removida
            let novosItems=[...items];
            removidos.forEach(m=>{novosItems=novosItems.map(i=>i.id===m.itemId?{...i,currentStock:Math.max(0,i.currentStock-m.quantity)}:i);});
            const novosMov=movements.filter(m=>!ids.includes(m.id));
            setMovements(novosMov);setItems(novosItems);
            showToast(ids.length+" entrada(s) excluída(s)","warning");
          }}/>
      </Card>

      {/* Modal criar/editar */}
      <Modal open={mod} onClose={()=>!sav&&(setMod(false),setEd(null))} title={ed?"Editar Entrada":"Nova Entrada"} width={600}>
        <FF label="Item" required>
          <div style={{position:"relative",marginBottom:8}}>
            <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Ic.Search size={16} color={C.textMuted}/></div>
            <input value={iq} onChange={e=>setIq(e.target.value)} placeholder="Buscar item..." style={{...iS,paddingLeft:40}}/>
          </div>
          {iq&&fi.length>0&&(
            <div style={{maxHeight:180,overflowY:"auto",border:"1px solid "+C.border,borderRadius:8,marginBottom:8,background:C.card}}>
              {fi.map(it=>(
                <div key={it.id} onClick={()=>{setF({...f,itemId:String(it.id),supplier:f.supplier||it.supplier||"",price:f.price||String(it.cost)});setIq("");}}
                  style={{padding:"10px 14px",cursor:"pointer",fontSize:14,borderBottom:"1px solid "+C.border}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background=C.card}>
                  <strong>{it.name}</strong> <span style={{color:C.textMuted}}>({it.unit})</span>
                </div>
              ))}
            </div>
          )}
          <Sel noMargin options={items.map(i=>({value:String(i.id),label:i.name+" ("+i.unit+")"}))} value={f.itemId} onChange={e=>{const it=items.find(i=>i.id===Number(e.target.value));setF({...f,itemId:e.target.value,supplier:f.supplier||(it?it.supplier:""),price:f.price||(it?String(it.cost):"")});}}/>
        </FF>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Quantidade" required type="number" min="1" value={f.quantity} onChange={e=>setF({...f,quantity:e.target.value})}/>
          <Inp label="Preço Unitário (R$)" required type="number" step="0.01" value={f.price} onChange={e=>setF({...f,price:e.target.value})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Nº do Lote" value={f.batch} onChange={e=>setF({...f,batch:e.target.value})}/>
          <Inp label="Validade" type="date" value={f.expiry} onChange={e=>setF({...f,expiry:e.target.value})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Data" required type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})}/>
          <Sel label="Responsável" required options={employees.filter(e=>e.status==="Ativo").map(e=>({value:e.name,label:e.name}))} value={f.employee} onChange={e=>setF({...f,employee:e.target.value})}/>
        </div>
        <Inp label="Fornecedor" value={f.supplier} onChange={e=>setF({...f,supplier:e.target.value})}/>

function OutTab({items,setItems,employees,movements,setMovements,showToast}){
  const [q,setQ]=useState("");
  const [iq,setIq]=useState("");
  const [mod,setMod]=useState(false);
  const [dm,setDm]=useState(false);
  const [td,setTd]=useState(null);
  const [ed,setEd]=useState(null);
  const [sav,setSav]=useState(false);
  const ef={itemId:"",quantity:"",employee:"",date:today(),time:nowT(),reason:""};
  const [f,setF]=useState(ef);
  const filt=useMemo(()=>movements.filter(m=>m.type==="out").sort((a,b)=>b.id-a.id).filter(m=>m.itemName.toLowerCase().includes(q.toLowerCase())),[movements,q]);
  const sel=items.find(i=>i.id===Number(f.itemId));
  const fi=useMemo(()=>items.filter(i=>i.name.toLowerCase().includes(iq.toLowerCase())),[items,iq]);

  function openEdit(row){
    setEd(row);
    setF({itemId:String(row.itemId),quantity:String(row.quantity),employee:row.employee,date:row.date,time:row.time,reason:row.reason||""});
    setIq("");setMod(true);
  }

  async function save(){
    if(!f.itemId||!f.quantity||!f.employee||!f.reason){showToast("Preencha todos os campos","error");return;}
    const qty=Number(f.quantity);
    if(isNaN(qty)||qty<=0){showToast("Quantidade inválida","error");return;}
    if(f.date>today()){showToast("Data não pode ser futura","error");return;}
    setSav(true);await new Promise(r=>setTimeout(r,300));
    if(ed){
      // Se o item mudou, devolve estoque ao item antigo e subtrai do novo
      const itemMudou=ed.itemId!==Number(f.itemId);
      setMovements(prev=>prev.map(m=>m.id===ed.id?{...m,itemId:Number(f.itemId),itemName:sel.name,quantity:qty,date:f.date,time:f.time,employee:f.employee,reason:f.reason,wasteReason:null}:m));
      if(itemMudou){
        setItems(prev=>prev.map(i=>{
          if(i.id===ed.itemId) return {...i,currentStock:i.currentStock+ed.quantity};
          if(i.id===Number(f.itemId)) return {...i,currentStock:Math.max(0,i.currentStock-qty)};
          return i;
        }));
      } else {
        const diff=ed.quantity-qty;
        setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:Math.max(0,i.currentStock+diff)}:i));
      }
      showToast("Saída atualizada!");
    } else {
      if(qty>sel.currentStock){showToast("Insuficiente! Disponível: "+sel.currentStock,"error");setSav(false);return;}
      setMovements(prev=>[...prev,{id:nid(prev),type:"out",itemId:Number(f.itemId),itemName:sel.name,quantity:qty,date:f.date,time:f.time,employee:f.employee,reason:f.reason,wasteReason:null,notes:"",supplier:null,price:null,batch:null,expiry:null,invoice:null}]);
      setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:i.currentStock-qty}:i));
      showToast("Saída de "+qty+" "+sel.unit+" registrada!");
    }
    setSav(false);setMod(false);setEd(null);setIq("");setF({...ef,date:today(),time:nowT()});
  }

  function doDelete(){
    // Devolve a quantidade ao estoque ao excluir
    setItems(prev=>prev.map(i=>i.id===td.itemId?{...i,currentStock:i.currentStock+td.quantity}:i));
    setMovements(prev=>prev.filter(m=>m.id!==td.id));
    showToast("Saída excluída","warning");
    setDm(false);setTd(null);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <SBar value={q} onChange={setQ} placeholder="Buscar saída..."/>
        <Btn onClick={()=>{setEd(null);setF({...ef,date:today(),time:nowT()});setIq("");setMod(true);}} variant="danger" icon={<Ic.Down size={16}/>}>Nova Saída</Btn>
      </div>
      <Card>
        <DT columns={[
          {key:"date",label:"Data",render:(v,r)=>fmtDate(v)+" "+r.time,nowrap:true},
          {key:"itemName",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},
          {key:"quantity",label:"Qtd",render:v=><Badge color={C.danger} bg={C.dangerLight}>-{v}</Badge>},
          {key:"reason",label:"Motivo"},
          {key:"employee",label:"Responsável"},
        ]} data={filt} onEdit={openEdit} onDelete={r=>{setTd(r);setDm(true);}}
          onBulkDelete={ids=>{
            const removidos=movements.filter(m=>ids.includes(m.id));
            // Devolve estoque de cada saída removida
            let novosItems=[...items];
            removidos.forEach(m=>{novosItems=novosItems.map(i=>i.id===m.itemId?{...i,currentStock:i.currentStock+m.quantity}:i);});
            const novosMov=movements.filter(m=>!ids.includes(m.id));
            setMovements(novosMov);setItems(novosItems);
            showToast(ids.length+" saída(s) excluída(s)","warning");
          }}/>
      </Card>

      {/* Modal criar/editar */}
      <Modal open={mod} onClose={()=>!sav&&(setMod(false),setEd(null))} title={ed?"Editar Saída":"Nova Saída"} width={560}>
        <FF label="Item" required>
          <div style={{position:"relative",marginBottom:8}}>
            <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Ic.Search size={16} color={C.textMuted}/></div>
            <input value={iq} onChange={e=>setIq(e.target.value)} placeholder="Buscar item..." style={{...iS,paddingLeft:40}}/>
          </div>
          {iq&&fi.length>0&&(
            <div style={{maxHeight:180,overflowY:"auto",border:"1px solid "+C.border,borderRadius:8,marginBottom:8}}>
              {fi.map(it=>(
                <div key={it.id} onClick={()=>{setF({...f,itemId:String(it.id)});setIq("");}}
                  style={{padding:"10px 14px",cursor:"pointer",fontSize:14,borderBottom:"1px solid "+C.border,background:C.card}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background=C.card}>
                  <strong>{it.name}</strong> <span style={{color:it.currentStock<=it.minStock?C.danger:C.success,fontWeight:600}}>(estoque: {it.currentStock})</span>
                </div>
              ))}
            </div>
          )}
          <Sel noMargin options={items.map(i=>({value:String(i.id),label:i.name+" ("+i.currentStock+" em estoque)"}))} value={f.itemId} onChange={e=>setF({...f,itemId:e.target.value})}/>
        </FF>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Quantidade" required type="number" min="1" value={f.quantity} onChange={e=>setF({...f,quantity:e.target.value})}/>
          <Sel label="Motivo" required options={EXIT_R} value={f.reason} onChange={e=>setF({...f,reason:e.target.value})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Data" required type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})}/>
          <Sel label="Responsável" required options={employees.filter(e=>e.status==="Ativo").map(e=>e.name)} value={f.employee} onChange={e=>setF({...f,employee:e.target.value})}/>
        </div>
        {sel&&(
          <div style={{background:C.bg,borderRadius:10,padding:12,fontSize:13,color:C.textSec}}>
            Estoque: <strong style={{color:sel.currentStock<=sel.minStock?C.danger:C.text}}>{sel.currentStock} {sel.unit}</strong>
            {!ed&&f.quantity&&Number(f.quantity)>0&&<span> → Após: <strong style={{color:sel.currentStock-Number(f.quantity)<=sel.minStock?C.danger:C.success}}>{sel.currentStock-Number(f.quantity)} {sel.unit}</strong></span>}
          </div>
        )}
        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:20}}>
          <Btn variant="ghost" onClick={()=>{setMod(false);setEd(null);}} disabled={sav}>Cancelar</Btn>
          <Btn variant="danger" onClick={save} icon={<Ic.Check size={16}/>} loading={sav}>{sav?"Salvando...":(ed?"Salvar":"Confirmar")}</Btn>
        </div>
      </Modal>

      {/* Modal excluir */}
      <Modal open={dm} onClose={()=>setDm(false)} title="Excluir Saída" width={420}>
        <p style={{fontSize:14,color:C.textSec,marginBottom:12}}>Tem certeza? A quantidade será devolvida ao estoque.</p>
        {td&&<div style={{background:C.dangerLight,padding:14,borderRadius:8,border:"1px solid "+C.danger,marginBottom:20}}>
          <div style={{fontSize:15,fontWeight:700}}>{td.itemName}</div>
          <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{fmtDate(td.date)} · -{td.quantity} unidades · {td.reason}</div>
        </div>}
        <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
          <Btn variant="ghost" onClick={()=>setDm(false)}>Cancelar</Btn>
          <Btn variant="danger" onClick={doDelete} icon={<Ic.Trash size={16}/>}>Excluir</Btn>
        </div>
      </Modal>
    </div>
  );
}

function WasteTab({items,setItems,employees,wastes,setWastes,showToast}){
  const [q,setQ]=useState("");
  const [mod,setMod]=useState(false);
  const [dm,setDm]=useState(false);
  const [td,setTd]=useState(null);
  const [ed,setEd]=useState(null);
  const [sav,setSav]=useState(false);
  const ef={itemId:"",quantity:"",wasteReason:"",employee:"",date:today(),time:nowT()};
  const [f,setF]=useState(ef);
  const df0=()=>{const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().split("T")[0];};
  const [df,setDf]=useState(df0);
  const [dt,setDt]=useState(today());
  const sel=items.find(i=>i.id===Number(f.itemId));
  const filt=useMemo(()=>wastes.filter(w=>w.date>=df&&w.date<=dt&&(w.itemName.toLowerCase().includes(q.toLowerCase())||w.employee.toLowerCase().includes(q.toLowerCase()))).sort((a,b)=>b.id-a.id),[wastes,q,df,dt]);
  const tv=useMemo(()=>filt.reduce((s,w)=>{const it=items.find(i=>i.id===w.itemId);return s+(it?w.quantity*it.cost:0);},0),[filt,items]);

  function openEdit(row){
    setEd(row);
    setF({itemId:String(row.itemId),quantity:String(row.quantity),wasteReason:row.wasteReason||"",employee:row.employee,date:row.date,time:row.time});
    setMod(true);
  }

  async function save(){
    if(!f.itemId||!f.quantity||!f.wasteReason||!f.employee){showToast("Preencha todos os campos","error");return;}
    const qty=Number(f.quantity);
    if(isNaN(qty)||qty<=0){showToast("Quantidade inválida","error");return;}
    if(f.date>today()){showToast("Data não pode ser futura","error");return;}
    setSav(true);await new Promise(r=>setTimeout(r,300));
    if(ed){
      const itemMudou=ed.itemId!==Number(f.itemId);
      setWastes(prev=>prev.map(w=>w.id===ed.id?{...w,itemId:Number(f.itemId),itemName:sel.name,quantity:qty,wasteReason:f.wasteReason,employee:f.employee,date:f.date,time:f.time}:w));
      if(itemMudou){
        setItems(prev=>prev.map(i=>{
          if(i.id===ed.itemId) return {...i,currentStock:i.currentStock+ed.quantity};
          if(i.id===Number(f.itemId)) return {...i,currentStock:Math.max(0,i.currentStock-qty)};
          return i;
        }));
      } else {
        const diff=ed.quantity-qty;
        setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:Math.max(0,i.currentStock+diff)}:i));
      }
      showToast("Desperdício atualizado!");
    } else {
      if(qty>sel.currentStock){showToast("Estoque insuficiente! Disponível: "+sel.currentStock+" "+sel.unit,"error");setSav(false);return;}
      setWastes(prev=>[...prev,{id:nid(prev),itemId:Number(f.itemId),itemName:sel.name,quantity:qty,wasteReason:f.wasteReason,employee:f.employee,date:f.date,time:f.time}]);
      setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:i.currentStock-qty}:i));
      showToast("Desperdício de "+qty+" "+sel.unit+" registrado!");
    }
    setSav(false);setMod(false);setEd(null);setF({...ef,date:today(),time:nowT()});
  }

  function doDelete(){
    setItems(prev=>prev.map(i=>i.id===td.itemId?{...i,currentStock:i.currentStock+td.quantity}:i));
    setWastes(prev=>prev.filter(w=>w.id!==td.id));
    showToast("Desperdício excluído","warning");
    setDm(false);setTd(null);
  }

  function dl(){
    if(!filt.length||typeof window.XLSX==="undefined") return;
    const d=filt.map(w=>{const it=items.find(i=>i.id===w.itemId);return{Data:fmtDate(w.date),Hora:w.time,Item:w.itemName,Qtd:w.quantity,Causa:w.wasteReason||"—",Valor:it?(w.quantity*it.cost).toFixed(2):"—",Resp:w.employee};});
    const ws=window.XLSX.utils.json_to_sheet(d);const wb=window.XLSX.utils.book_new();window.XLSX.utils.book_append_sheet(wb,ws,"Desperdício");window.XLSX.writeFile(wb,"desperdicio.xlsx");
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <SBar value={q} onChange={setQ} placeholder="Buscar desperdício..."/>
        <input type="date" value={df} onChange={e=>setDf(e.target.value)} style={{...iS,width:140,padding:"10px 12px"}}/>
        <input type="date" value={dt} onChange={e=>setDt(e.target.value)} style={{...iS,width:140,padding:"10px 12px"}}/>
        <Btn onClick={dl} variant="secondary" icon={<Ic.Dl size={16}/>}>Exportar</Btn>
        <Btn onClick={()=>{setEd(null);setF({...ef,date:today(),time:nowT()});setMod(true);}} variant="danger" icon={<Ic.Warn size={16}/>}>Registrar Perda</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16}}>
        <KPI icon={<Ic.Warn size={20} color={C.danger}/>} label="Perdas no Período" value={filt.length} bgColor={C.dangerLight}/>
        <KPI icon={<Ic.Store size={20} color={C.warning}/>} label="Valor Perdido" value={fmt(tv)} bgColor={C.warningLight}/>
      </div>
      <Card>
        <DT columns={[
          {key:"date",label:"Data",render:(v,r)=>fmtDate(v)+" "+r.time,nowrap:true},
          {key:"itemName",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},
          {key:"quantity",label:"Qtd",render:v=><Badge color={C.danger} bg={C.dangerLight}>{v}</Badge>},
          {key:"wasteReason",label:"Causa",render:v=>v||"—"},
          {key:"employee",label:"Responsável"},
        ]} data={filt}
          onEdit={openEdit}
          onDelete={r=>{setTd(r);setDm(true);}}
          onBulkDelete={ids=>{
            const removidos=wastes.filter(w=>ids.includes(w.id));
            let novosItems=[...items];
            removidos.forEach(w=>{novosItems=novosItems.map(i=>i.id===w.itemId?{...i,currentStock:i.currentStock+w.quantity}:i);});
            setWastes(wastes.filter(w=>!ids.includes(w.id)));
            setItems(novosItems);
            showToast(ids.length+" desperdício(s) excluído(s)","warning");
          }}/>
      </Card>

      {/* Modal criar/editar */}
      <Modal open={mod} onClose={()=>!sav&&(setMod(false),setEd(null))} title={ed?"Editar Desperdício":"Registrar Perda/Desperdício"}>
        <Sel label="Item" required options={items.map(i=>({value:String(i.id),label:i.name+" ("+i.currentStock+" disponível)"}))} value={f.itemId} onChange={e=>setF({...f,itemId:e.target.value})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Quantidade" required type="number" min="1" value={f.quantity} onChange={e=>setF({...f,quantity:e.target.value})}/>
          <Sel label="Causa" required options={WASTE_R} value={f.wasteReason} onChange={e=>setF({...f,wasteReason:e.target.value})}/>
        </div>
        <Sel label="Responsável" required options={employees.filter(e=>e.status==="Ativo").map(e=>e.name)} value={f.employee} onChange={e=>setF({...f,employee:e.target.value})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Data" required type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})}/>
          <Inp label="Hora" type="time" value={f.time} onChange={e=>setF({...f,time:e.target.value})}/>
        </div>
        {sel&&(
          <div style={{background:sel.currentStock<=sel.minStock?C.warningLight:C.bg,borderRadius:10,padding:12,fontSize:13,color:C.textSec,display:"flex",alignItems:"center",gap:8}}>
            <Ic.Info size={16} color={C.textMuted}/>
            <span>Estoque: <strong style={{color:sel.currentStock<=sel.minStock?C.danger:C.success}}>{sel.currentStock} {sel.unit}</strong> (mín: {sel.minStock})</span>
          </div>
        )}
        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:20}}>
          <Btn variant="ghost" onClick={()=>{setMod(false);setEd(null);}} disabled={sav}>Cancelar</Btn>
          <Btn variant="danger" onClick={save} icon={<Ic.Check size={16}/>} loading={sav}>{sav?"Salvando...":(ed?"Salvar":"Confirmar")}</Btn>
        </div>
      </Modal>

      {/* Modal excluir */}
      <Modal open={dm} onClose={()=>setDm(false)} title="Excluir Desperdício" width={420}>

          <div style={{fontSize:15,fontWeight:700}}>{td.itemName}</div>
          <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{fmtDate(td.date)} · {td.quantity} unidades · {td.wasteReason}</div>
        </div>}
        <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
          <Btn variant="ghost" onClick={()=>setDm(false)}>Cancelar</Btn>
          <Btn variant="danger" onClick={doDelete} icon={<Ic.Trash size={16}/>}>Excluir</Btn>
        </div>
      </Modal>
    </div>
  );
}

      if(qty>sel.currentStock){showToast("Estoque insuficiente! Disponível: "+sel.currentStock+" "+sel.unit,"error");setSav(false);return;}
      setPortioning(prev=>[...prev,{id:nid(portioning),itemId:Number(f.itemId),itemName:sel.name,quantity:qty,date:f.date,time:f.time,employee:f.employee}]);
      setItems(prev=>prev.map(i=>i.id===Number(f.itemId)?{...i,currentStock:i.currentStock-qty}:i));
      showToast("Porcionamento registrado!");
    }
    setSav(false);setMod(false);setEd(null);setF({...ef,date:today(),time:nowT()});
  }

  function doDelete(){
    // Devolve a quantidade ao estoque ao excluir
    setItems(prev=>prev.map(i=>i.id===td.itemId?{...i,currentStock:i.currentStock+td.quantity}:i));
    setPortioning(prev=>prev.filter(p=>p.id!==td.id));
    showToast("Porcionamento excluído","warning");
    setDm(false);setTd(null);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <SBar value={q} onChange={setQ} placeholder="Buscar..."/>
        <Btn onClick={()=>{setEd(null);setF({...ef,date:today(),time:nowT()});setMod(true);}} icon={<Ic.Cut size={16}/>}>Novo Porcionamento</Btn>
      </div>
      <Card>
        <DT columns={[
          {key:"date",label:"Data",render:(v,r)=>fmtDate(v)+" "+r.time,nowrap:true},
          {key:"itemName",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},
          {key:"quantity",label:"Quantidade",render:v=><Badge color={C.accent} bg={C.accentLight}>{v}</Badge>},
          {key:"employee",label:"Responsável"},
        ]} data={filt} onEdit={openEdit} onDelete={r=>{setTd(r);setDm(true);}}
          onBulkDelete={ids=>{
            const removidos=portioning.filter(p=>ids.includes(p.id));
            // Devolve estoque de cada porcionamento removido
            let novosItems=[...items];
            removidos.forEach(p=>{novosItems=novosItems.map(i=>i.id===p.itemId?{...i,currentStock:i.currentStock+p.quantity}:i);});
            const novosPort=portioning.filter(p=>!ids.includes(p.id));
            setPortioning(novosPort);setItems(novosItems);
            showToast(ids.length+" porcionamento(s) excluído(s)","warning");
          }}/>
      </Card>

      {/* Modal criar/editar */}
      <Modal open={mod} onClose={()=>!sav&&(setMod(false),setEd(null))} title={ed?"Editar Porcionamento":"Novo Porcionamento"}>
        <Sel label="Item" required options={items.map(i=>({value:String(i.id),label:i.name+" ("+i.currentStock+" disponível)"}))} value={f.itemId} onChange={e=>setF({...f,itemId:e.target.value})}/>
        <Inp label="Quantidade" required type="number" min="1" value={f.quantity} onChange={e=>setF({...f,quantity:e.target.value})}/>
        <Sel label="Responsável" required options={employees.filter(e=>e.status==="Ativo").map(e=>e.name)} value={f.employee} onChange={e=>setF({...f,employee:e.target.value})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Inp label="Data" required type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})}/>
          <Inp label="Hora" type="time" value={f.time} onChange={e=>setF({...f,time:e.target.value})}/>
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:20}}>
          <Btn variant="ghost" onClick={()=>{setMod(false);setEd(null);}} disabled={sav}>Cancelar</Btn>
          <Btn onClick={save} icon={<Ic.Check size={16}/>} loading={sav}>{sav?"Salvando...":(ed?"Salvar":"Confirmar")}</Btn>
        </div>
      </Modal>

      {/* Modal excluir */}
      <Modal open={dm} onClose={()=>setDm(false)} title="Excluir Porcionamento" width={420}>
        <p style={{fontSize:14,color:C.textSec,marginBottom:12}}>Tem certeza? A quantidade será devolvida ao estoque.</p>
        {td&&<div style={{background:C.dangerLight,padding:14,borderRadius:8,border:"1px solid "+C.danger,marginBottom:20}}>
          <div style={{fontSize:15,fontWeight:700}}>{td.itemName}</div>
          <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{fmtDate(td.date)} · {td.quantity} unidades · {td.employee}</div>
        </div>}
        <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
          <Btn variant="ghost" onClick={()=>setDm(false)}>Cancelar</Btn>
          <Btn variant="danger" onClick={doDelete} icon={<Ic.Trash size={16}/>}>Excluir</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ===== FUNCIONÁRIOS =====
function EmpTab({employees,setEmployees,showToast}){
  const [q,setQ]=useState("");
  const [mod,setMod]=useState(false);
  const [ed,setEd]=useState(null);
  const ef={name:"",role:"",username:""};
  const [f,setF]=useState(ef);
  const [sav,setSav]=useState(false);
  const filt=useMemo(()=>employees.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())),[employees,q]);

  async function save(){
    if(!f.name||!f.role||!f.username){showToast("Preencha todos os campos","error");return;}
    const usnTaken=employees.some(e=>e.username===f.username.trim()&&(!ed||e.id!==ed.id));
    if(usnTaken){showToast("Nome de usuário já existe!","error");return;}
    setSav(true);await new Promise(r=>setTimeout(r,300));
    if(ed){setEmployees(prev=>prev.map(e=>e.id===ed.id?{...e,...f,username:f.username.trim()}:e));showToast("Atualizado!");}
    else{setEmployees(prev=>[...prev,{id:nid(prev),...f,username:f.username.trim(),status:"Ativo"}]);showToast("Cadastrado!");}
    setSav(false);setMod(false);
  }

  function toggleStatus(row){
    const ns=row.status==="Ativo"?"Inativo":"Ativo";
    setEmployees(prev=>prev.map(e=>e.id===row.id?{...e,status:ns}:e));
    showToast(row.name+" "+(ns==="Ativo"?"ativado":"desativado")+"!",ns==="Ativo"?"success":"warning");
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <SBar value={q} onChange={setQ} placeholder="Buscar funcionário..."/>
        <Btn onClick={()=>{setEd(null);setF(ef);setMod(true);}} icon={<Ic.Plus size={16}/>}>Novo Funcionário</Btn>
      </div>
      <Card>
        <DT columns={[
          {key:"name",label:"Nome",render:v=><span style={{fontWeight:600}}>{v}</span>},
          {key:"role",label:"Cargo"},
          {key:"username",label:"Usuário"},
          {key:"status",label:"Status",render:v=><Badge color={v==="Ativo"?C.success:C.textMuted} bg={v==="Ativo"?C.successLight:C.bg}>{v}</Badge>},
        ]} data={filt}
          onEdit={r=>{setEd(r);setF({name:r.name,role:r.role,username:r.username});setMod(true);}}
          actions={row=>(
            <Btn variant="ghost" size="sm" onClick={()=>toggleStatus(row)}
              icon={row.status==="Ativo"?<Ic.Close size={14}/>:<Ic.Check size={14}/>}/>
          )}/>
      </Card>
      <Modal open={mod} onClose={()=>!sav&&setMod(false)} title={ed?"Editar Funcionário":"Novo Funcionário"}>
        <Inp label="Nome Completo" required value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
        <Sel label="Cargo" required options={ROLES} value={f.role} onChange={e=>setF({...f,role:e.target.value})}/>
        <Inp label="Nome de Usuário" required value={f.username} onChange={e=>setF({...f,username:e.target.value})}/>
        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:20}}>
          <Btn variant="ghost" onClick={()=>setMod(false)} disabled={sav}>Cancelar</Btn>
          <Btn onClick={save} icon={<Ic.Check size={16}/>} loading={sav}>{sav?"Salvando...":"Salvar"}</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ===== RELATÓRIOS =====
function RepTab({items,movements}){
  const [type,setType]=useState("stock");
  const reps=[{id:"stock",label:"Estoque Atual",IC:Ic.Box},{id:"movements",label:"Movimentações",IC:Ic.Doc},{id:"critical",label:"Itens Críticos",IC:Ic.Warn}];

  function dl(){
    if(typeof window.XLSX==="undefined") return;
    let d=[],fn="";
    if(type==="stock"){d=items.map(i=>({Item:i.name,Categoria:i.category,Unidade:i.unit,Estoque:i.currentStock,Mínimo:i.minStock,Custo:i.cost,Total:(i.currentStock*i.cost).toFixed(2)}));fn="estoque.xlsx";}
    else if(type==="movements"){d=movements.map(m=>({Tipo:m.type==="in"?"Entrada":"Saída",Data:fmtDate(m.date),Item:m.itemName,Qtd:m.quantity,Resp:m.employee}));fn="movimentacoes.xlsx";}
    else{d=items.filter(i=>i.currentStock<=i.minStock).map(i=>({Item:i.name,Estoque:i.currentStock,Mínimo:i.minStock,Déficit:i.minStock-i.currentStock}));fn="criticos.xlsx";}
    if(d.length){const ws=window.XLSX.utils.json_to_sheet(d);const wb=window.XLSX.utils.book_new();window.XLSX.utils.book_append_sheet(wb,ws,"Relatório");window.XLSX.writeFile(wb,fn);}
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {reps.map(r=>(
          <button key={r.id} onClick={()=>setType(r.id)}
            style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",borderRadius:10,border:type===r.id?"2px solid "+C.primary:"1.5px solid "+C.border,background:type===r.id?C.primaryLight:C.card,cursor:"pointer",fontSize:13,fontWeight:type===r.id?700:500,color:type===r.id?C.primary:C.textSec,fontFamily:font}}>
            <r.IC size={16}/>{r.label}
          </button>
        ))}
        <Btn onClick={dl} variant="secondary" icon={<Ic.Dl size={16}/>}>Exportar Excel</Btn>
      </div>
      <Card>
        <div style={{padding:"16px 20px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <h3 style={{fontSize:16,fontWeight:700,fontFamily:fontD}}>{reps.find(r=>r.id===type)?.label}</h3>
          <span style={{fontSize:12,color:C.textMuted,fontFamily:font}}>
            {type==="stock"&&fmtN(items.length)+" itens"}
            {type==="movements"&&fmtN(movements.length)+" movimentações"}
            {type==="critical"&&fmtN(items.filter(i=>i.currentStock<=i.minStock).length)+" críticos"}
          </span>
        </div>
        {type==="stock"&&<DT columns={[{key:"name",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},{key:"category",label:"Categoria"},{key:"currentStock",label:"Estoque",render:(v,r)=><span style={{fontWeight:700,color:v<=r.minStock?C.danger:C.success}}>{v}</span>},{key:"minStock",label:"Mínimo"},{key:"cost",label:"Valor Total",render:(v,r)=>fmt(r.currentStock*v),nowrap:true}]} data={items}/>}
        {type==="movements"&&<DT columns={[{key:"type",label:"Tipo",render:v=>v==="in"?<Badge color={C.success} bg={C.successLight}>Entrada</Badge>:<Badge color={C.danger} bg={C.dangerLight}>Saída</Badge>},{key:"date",label:"Data",render:(v,r)=>fmtDate(v)+" "+r.time,nowrap:true},{key:"itemName",label:"Item"},{key:"quantity",label:"Qtd"},{key:"employee",label:"Responsável"}]} data={movements.slice().reverse()}/>}
        {type==="critical"&&<DT columns={[{key:"name",label:"Item",render:v=><span style={{fontWeight:600}}>{v}</span>},{key:"currentStock",label:"Estoque",render:v=><span style={{color:C.danger,fontWeight:700}}>{v}</span>},{key:"minStock",label:"Mínimo"},{key:"supplier",label:"Fornecedor",render:v=>v||"—"}]} data={items.filter(i=>i.currentStock<=i.minStock)}/>}
      </Card>
    </div>
  );
}

// ===== CONFIGURAÇÕES =====
function SettTab({categories,setCategories,units,setUnits,items,showToast,onResetDb}){
  const [nc,setNc]=useState("");
  const [nu,setNu]=useState("");
  const [confirmDel,setConfirmDel]=useState(null); // {type:'cat'|'unit', value, count}

  function tryRemoveCat(cat){
    const count=items.filter(i=>i.category===cat).length;
    if(count>0){setConfirmDel({type:"cat",value:cat,count});return;}
    setCategories(categories.filter(x=>x!==cat));showToast("Categoria removida","warning");
  }
  function tryRemoveUnit(unit){
    const count=items.filter(i=>i.unit===unit).length;
    if(count>0){setConfirmDel({type:"unit",value:unit,count});return;}
    setUnits(units.filter(x=>x!==unit));showToast("Unidade removida","warning");
  }
  function confirmRemove(){
    if(!confirmDel) return;
    if(confirmDel.type==="cat") setCategories(categories.filter(x=>x!==confirmDel.value));
    else setUnits(units.filter(x=>x!==confirmDel.value));
    showToast("Removida","warning");setConfirmDel(null);
  }

  function addC(){
    const t=nc.trim();if(!t) return;
    if(categories.some(c=>c.toLowerCase()===t.toLowerCase())){showToast("Já existe","error");return;}
    setCategories([...categories,t]);setNc("");showToast("Categoria adicionada!");
  }
  function addU(){
    const t=nu.trim();if(!t) return;
    if(units.some(u=>u.toLowerCase()===t.toLowerCase())){showToast("Já existe","error");return;}
    setUnits([...units,t]);setNu("");showToast("Unidade adicionada!");
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <Card style={{padding:24}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,fontFamily:fontD}}>Categorias</h3>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={nc} onChange={e=>setNc(e.target.value)} onKeyPress={e=>e.key==="Enter"&&addC()} placeholder="Nova categoria" style={{...iS,flex:1}}/>
          <Btn onClick={addC} icon={<Ic.Plus size={16}/>}>Adicionar</Btn>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {categories.map(c=>{const n=items.filter(i=>i.category===c).length;return(
            <div key={c} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:C.bg,borderRadius:8,border:"1px solid "+C.border}}>
              <span style={{fontSize:13}}>{c}</span>
              {n>0&&<span style={{fontSize:10,color:C.textMuted,background:C.border,borderRadius:10,padding:"1px 6px"}}>{n}</span>}
              <div onClick={()=>tryRemoveCat(c)} style={{cursor:"pointer",display:"flex",alignItems:"center"}}><Ic.Close size={14} color={C.danger}/></div>
            </div>
          );})}
        </div>
      </Card>
      <Card style={{padding:24}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,fontFamily:fontD}}>Unidades de Medida</h3>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={nu} onChange={e=>setNu(e.target.value)} onKeyPress={e=>e.key==="Enter"&&addU()} placeholder="Nova unidade" style={{...iS,flex:1}}/>
          <Btn onClick={addU} icon={<Ic.Plus size={16}/>}>Adicionar</Btn>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {units.map(u=>{const n=items.filter(i=>i.unit===u).length;return(
            <div key={u} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:C.bg,borderRadius:8,border:"1px solid "+C.border}}>
              <span style={{fontSize:13}}>{u}</span>
              {n>0&&<span style={{fontSize:10,color:C.textMuted,background:C.border,borderRadius:10,padding:"1px 6px"}}>{n}</span>}
              <div onClick={()=>tryRemoveUnit(u)} style={{cursor:"pointer",display:"flex",alignItems:"center"}}><Ic.Close size={14} color={C.danger}/></div>
            </div>
          );})}
        </div>
      </Card>
      <Card style={{padding:24,border:"2px solid "+C.dangerLight}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <Ic.Warn size={20} color={C.danger}/>
          <h3 style={{fontSize:16,fontWeight:700,fontFamily:fontD,margin:0,color:C.danger}}>Zona de Perigo</h3>
        </div>
        <p style={{fontSize:13,color:C.textSec,marginBottom:16}}>Apaga todos os dados e restaura valores iniciais.</p>
        <Btn variant="danger" onClick={onResetDb} icon={<Ic.Trash size={16}/>}>Resetar Banco de Dados</Btn>
      </Card>
      {/* Modal confirmação remoção cat/unit em uso */}
      <Modal open={!!confirmDel} onClose={()=>setConfirmDel(null)} title="Confirmar Remoção" width={420}>
        {confirmDel&&(
          <>
            <div style={{background:C.warningLight,borderRadius:10,padding:16,border:"1px solid "+C.warning,marginBottom:20,display:"flex",gap:12,alignItems:"flex-start"}}>
              <Ic.Warn size={22} color={C.warning}/>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>
                  "{confirmDel.value}" está em uso por {confirmDel.count} item{confirmDel.count>1?"ns":""}
                </div>
                <div style={{fontSize:13,color:C.textSec}}>
                  Os itens que usam {confirmDel.type==="cat"?"essa categoria":"essa unidade"} ficarão com valor inválido. Deseja continuar?
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setConfirmDel(null)}>Cancelar</Btn>
              <Btn variant="danger" onClick={confirmRemove} icon={<Ic.Trash size={16}/>}>Remover mesmo assim</Btn>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
